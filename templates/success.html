{% extends "base.html" %}
{% block title %}{{ title }} - GJPP{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:4rem 2rem;">
    <div style="text-align:center;max-width:520px;">
        <div style="font-size:5rem;margin-bottom:1.5rem;animation:bounce 1s ease;">{{ icon }}</div>
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;color:var(--text);margin-bottom:1rem;">{{ title }}</h1>
        <p style="color:var(--text-muted);font-size:1.05rem;line-height:1.7;margin-bottom:2.5rem;">{{ message }}</p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
            <a href="/" class="btn btn-primary btn-lg">Go to Homepage</a>
            <a href="/events" class="btn btn-outline btn-lg">View Events</a>
        </div>
        <p style="margin-top:2rem;font-size:0.875rem;color:var(--text-muted);">
            Questions? <a href="/enquiry" style="color:var(--blue);">Contact us anytime.</a>
            <br><em style="font-size:0.8rem;">Jai Jinendra 🙏</em>
        </p>
    </div>
</div>
<style>
@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    30% { transform: translateY(-20px); }
    60% { transform: translateY(-10px); }
}
</style>
{% endblock %}
