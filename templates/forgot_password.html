{% extends "base.html" %}
{% block title %}Forgot Password - GJPP{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;">
    <div style="max-width:480px;width:100%;">
        <div class="card" style="overflow:visible;">
            <div style="background:linear-gradient(135deg,var(--jain-blue),var(--blue-mid));padding:2.5rem;text-align:center;border-radius:16px 16px 0 0;">
                <div style="font-size:3rem;margin-bottom:0.75rem;">🔑</div>
                <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:white;font-weight:800;">Reset Password</h1>
                <p style="color:rgba(255,255,255,0.6);font-size:0.9rem;">Enter your email and we'll send you a reset link.</p>
            </div>
            <form method="POST" action="/forgot-password" style="padding:2rem;">
                <div class="form-group">
                    <label class="form-label">Email Address <span style="color:var(--jain-red);">*</span></label>
                    <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <select name="role" class="form-select">
                        <option value="admin">Admin</option>
                        <option value="parent">Parent</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-blue btn-lg" style="width:100%;justify-content:center;">Send Reset Link</button>
                <div style="text-align:center;margin-top:1.25rem;">
                    <a href="/login" style="font-size:0.85rem;color:var(--jain-blue);font-weight:700;text-decoration:none;">← Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
